  - "engineering"
  - "sales"
  - "marketing"
  - "web"
routines:
  # ───── Sales (project: sales-pipeline) ─────
  daily-crm-sweep:
    title: "Daily CRM sweep — {{date}}"
    description: |
      Run the daily CRM sweep per HEARTBEAT.md.
      Output: Hot/Warm/At-Risk priority list + escalations to CEO if any.
    assigneeAgentId: head-of-sales
    projectId: sales-pipeline
    priority: high
    triggers:
      - kind: schedule
        cronExpression: "0 9 * * 1-5"
        timezone: Europe/Stockholm
  daily-gmail-sweep:
    title: "Gmail sweep — {{date}}"
    description: |
      Scan Gmail for replies. Match to CRM. Submit Outreach Log requests via Steward. Escalate hot replies.
    assigneeAgentId: follow-up-manager
    projectId: sales-pipeline
    triggers:
      - kind: schedule
        cronExpression: "0 9 * * 1-5"
        timezone: Europe/Stockholm
  daily-crm-steward-hygiene:
    title: "CRM hygiene + schema snapshot — {{date}}"
    description: |
      Schema snapshot + dedup scan + anomaly flags + DIGEST to Head of Sales.
    assigneeAgentId: crm-steward
    projectId: sales-pipeline
    triggers:
      - kind: schedule
        cronExpression: "0 6 * * *"
        timezone: Europe/Stockholm
  daily-lead-research:
    title: "Lead research — {{date}}"
    description: |
      Engagement-sourcing first (LinkedIn engagers from Tier 1 capture log).
      Apollo sourcing second to fill weekly volume target.
    assigneeAgentId: lead-researcher
    projectId: sales-pipeline
    triggers:
      - kind: schedule
        cronExpression: "0 10 * * 1-5"
        timezone: Europe/Stockholm
  weekly-friday-board-brief:
    title: "Friday Board Brief — week of {{week}}"
    description: |
      Weekly cross-funnel brief (top-of-funnel + pipeline + LinkedIn + magnets + newsletter).
    assigneeAgentId: growth-analyst
    projectId: sales-pipeline
    priority: high
    triggers:
      - kind: schedule
        cronExpression: "0 16 * * 5"
        timezone: Europe/Stockholm
  # ───── Marketing (project: demand-creation) ─────
  monday-marketing-review:
    title: "Marketing weekly review + content calendar — week of {{week}}"
    description: |
      Read Growth Analyst's Friday brief. Update content-playbook.md.
      Publish content calendar (3 LinkedIn posts Mon/Wed/Fri + newsletter + magnet milestone + 5 web articles).
      Conversations-→-content pass: pull recurring objections from last 7 days of Outreach Log.
    assigneeAgentId: head-of-marketing
    projectId: demand-creation
    priority: high
    triggers:
      - kind: schedule
        cronExpression: "0 8 * * 1"
        timezone: Europe/Stockholm
  # ───── Web team (project: web-publishing) ─────
  monday-seo-research:
    title: "SEO + AEO weekly research — week of {{week}}"
    description: |
      Keyword + AEO research. Brief 5+ articles for Web Writer's coming week.
      Update keyword-roadmap.md.
    assigneeAgentId: seo-aeo-specialist
    projectId: seo-aeo-growth
    triggers:
      - kind: schedule
        cronExpression: "0 10 * * 1"
        timezone: Europe/Stockholm
  wednesday-aeo-citation-probe:
    title: "AEO citation probe — {{date}}"
    description: |
      Query ChatGPT, Perplexity, Claude, Gemini against tracked queries.
      Log results in aeo-citation-log.md. Surface gaps as new briefs.
    assigneeAgentId: seo-aeo-specialist
    projectId: seo-aeo-growth
    triggers:
      - kind: schedule
        cronExpression: "0 10 * * 3"
        timezone: Europe/Stockholm
  friday-seo-tech-health:
    title: "SEO technical health check — {{date}}"
    description: |
      Search Console scan + CWV report + schema audit + sitemap validity check.
      File issues to Web Operations.
    assigneeAgentId: seo-aeo-specialist
    projectId: seo-aeo-growth
    triggers:
      - kind: schedule
        cronExpression: "0 14 * * 5"
        timezone: Europe/Stockholm
  daily-blog-publish:
    title: "Blog article — {{date}} {{time}}"
    description: |
      Pull the next article brief from SEO + AEO Specialist's roadmap.
      Draft per the article shape (hook + AEO answer block + body + CTA).
      Submit for SEO + AEO review.
      Fires twice daily, 7 days/week → target 14 articles/week.
    assigneeAgentId: web-writer
    projectId: web-publishing
    priority: high
    triggers:
      - kind: schedule
        cronExpression: "0 9,15 * * *"
        timezone: Europe/Stockholm
  daily-search-console-analysis:
    title: "Search Console analysis — {{date}}"
    description: |
      Read yesterday's GSC data via Composio. Surface: top queries, new ranking pages,
      pages losing rankings, coverage/indexing errors, click-through anomalies.
      Flag opportunities to SEO + AEO Specialist via subtask. Flag tech issues to self for fix.
    assigneeAgentId: web-operations
    projectId: web-publishing
    priority: high
    triggers:
      - kind: schedule
        cronExpression: "0 8 * * *"
        timezone: Europe/Stockholm
  daily-seo-trend-scan:
    title: "SEO trend scan — {{date}}"
    description: |
      Cover all 4 source classes: industry blogs, Google Search Central, AEO/GEO platforms, competitor moves.
      Output: structured trend-log entry with one Action per finding.
      Distribute Actions as subtasks to SEO + AEO Specialist / Web Writer / Web Operations.
    assigneeAgentId: seo-trend-researcher
    projectId: seo-aeo-growth
    priority: high
    triggers:
      - kind: schedule
        cronExpression: "0 7 * * 1-5"
        timezone: Europe/Stockholm
  monday-seo-trend-synthesis:
    title: "SEO trend weekly synthesis — week of {{week}}"
    description: |
      Roll up the week's trend Actions. Update seo-playbook.md with validated tactics.
      Propose ≥3 new article briefs to SEO + AEO Specialist. Post DIGEST to Head of Marketing.
    assigneeAgentId: seo-trend-researcher
    projectId: seo-aeo-growth
    priority: high
    triggers:
      - kind: schedule
        cronExpression: "30 10 * * 1"
        timezone: Europe/Stockholm
  web-ops-monitoring-mwf:
    title: "Web ops monitoring scan — {{date}}"
    description: |
      Vercel deploy log + GA4 anomalies + Search Console errors + magnet form pipeline health.
      Investigate any anomalies via systematic-debugging.
    assigneeAgentId: web-operations
    projectId: web-publishing
    triggers:
      - kind: schedule
        cronExpression: "0 11 * * 1,3,5"
        timezone: Europe/Stockholm
  friday-web-performance-review:
    title: "Web weekly performance review — week of {{week}}"
    description: |
      Search Console deep scan + CWV per page + GA4 funnel review + tag-coverage audit.
      Post DIGEST to Head of Marketing.
    assigneeAgentId: web-operations
    projectId: web-publishing
    triggers:
      - kind: schedule
        cronExpression: "0 15 * * 5"
        timezone: Europe/Stockholm
  # ───── Customer Success ─────
  weekly-cs-retention-brief:
    title: "Retention brief — week of {{week}}"
